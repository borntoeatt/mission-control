<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mission Control</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #06080c;
      font-family: 'Share Tech Mono', monospace;
      color: #c0c8d4;
      min-height: 100vh;
      overflow-x: hidden;
    }
    /* CRT scanline overlay */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 9999;
      background: repeating-linear-gradient(0deg, rgba(0,0,0,0.06) 0px, rgba(0,0,0,0.06) 1px, transparent 1px, transparent 3px);
      mix-blend-mode: multiply;
    }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #06080c; }
    ::-webkit-scrollbar-thumb { background: #1a2332; border-radius: 3px; }
    @keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
    @keyframes blink { 0%,100% { opacity:1; } 50% { opacity:0; } }
    .blink-dot {
      display: inline-block;
      width: 8px; height: 8px;
      border-radius: 50%;
      margin-right: 6px;
      animation: blink 1.4s ease-in-out infinite;
    }
    .blink-green { background: #22c55e; box-shadow: 0 0 6px #22c55e; }
    .blink-orange { background: #f59e42; box-shadow: 0 0 6px #f59e42; }

    /* Layout */
    .dashboard { padding: 24px 28px; animation: fadeIn 0.6s ease; }
    .header {
      display: flex; justify-content: space-between; align-items: flex-end;
      border-bottom: 1px solid #111822; padding-bottom: 14px; margin-bottom: 24px;
    }
    .header-title {
      font-size: 22px; font-family: 'Orbitron', sans-serif; color: #00ffc8;
      font-weight: 700; letter-spacing: 4px; text-shadow: 0 0 20px #00ffc833;
    }
    .header-sub { font-size: 11px; color: #3a4a5a; letter-spacing: 2px; margin-top: 4px; }
    .header-status { display: flex; align-items: center; gap: 6px; font-size: 11px; color: #22c55e; letter-spacing: 1px; }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
    }
    @media (max-width: 768px) {
      .grid { grid-template-columns: 1fr; }
      .span-2 { grid-column: span 1 !important; }
    }
    .span-2 { grid-column: span 2; }

    /* Card */
    .card {
      background: linear-gradient(165deg, #0d1117 0%, #0a0e14 100%);
      border: 1px solid #1a2332; border-radius: 6px;
      padding: 16px 20px; position: relative; overflow: hidden;
    }
    .card::before {
      content: ''; position: absolute; top: 0; left: 0;
      width: 40px; height: 2px; background: #00ffc8; opacity: 0.6;
    }
    .card::after {
      content: ''; position: absolute; top: 0; left: 0;
      width: 2px; height: 24px; background: #00ffc8; opacity: 0.6;
    }
    .card-header {
      display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px;
    }
    .card-title {
      font-size: 11px; letter-spacing: 3px; color: #5a6a7a; text-transform: uppercase;
    }
    .card-status { font-size: 9px; letter-spacing: 1px; display: flex; align-items: center; }
    .card-status.live { color: #0f0; }
    .card-status.err { color: #f80; }
    .card-status.loading { color: #556; }

    /* Stats */
    .stat-label { font-size: 10px; letter-spacing: 2px; color: #667; text-transform: uppercase; }
    .stat-value { font-size: 26px; font-weight: 700; font-family: 'Orbitron', sans-serif; }
    .stat-unit { font-size: 12px; color: #889; margin-left: 4px; }

    /* Weather */
    .weather-main { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
    .weather-icon { font-size: 42px; }
    .weather-temp {
      font-size: 36px; font-family: 'Orbitron', sans-serif; color: #00ffc8;
      font-weight: 700; text-shadow: 0 0 18px #00ffc844; line-height: 1;
    }
    .weather-desc { font-size: 12px; color: #667; margin-top: 2px; }
    .weather-stats { display: flex; gap: 24px; }

    /* Clocks */
    .clocks { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .clock-label { font-size: 9px; letter-spacing: 2px; color: #556; margin-bottom: 2px; }
    .clock-time { font-size: 20px; font-family: 'Orbitron', sans-serif; color: #8892a4; }
    .clock-time.primary { color: #00ffc8; text-shadow: 0 0 10px #00ffc844; }

    /* Crypto */
    .coin-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 6px 10px; background: #0b1018; border-radius: 4px;
      border: 1px solid #151d28; margin-bottom: 6px;
    }
    .coin-row:last-child { margin-bottom: 0; }
    .coin-info { display: flex; align-items: center; gap: 8px; }
    .coin-icon { width: 20px; height: 20px; border-radius: 10px; }
    .coin-symbol { font-size: 12px; font-family: 'Orbitron', sans-serif; color: #c0c8d4; letter-spacing: 1px; }
    .coin-price { font-size: 15px; font-family: 'Orbitron', sans-serif; color: #e2e8f0; font-weight: 600; }
    .coin-change { font-size: 11px; }
    .coin-change.up { color: #22c55e; }
    .coin-change.down { color: #ef4444; }

    /* Uptime */
    .uptime-bars { display: flex; gap: 2px; margin-bottom: 10px; }
    .uptime-bar { flex: 1; height: 22px; border-radius: 2px; }
    .uptime-bar.ok { background: linear-gradient(180deg, #22c55e 0%, #16a34a 100%); opacity: 0.8; }
    .uptime-bar.down { background: linear-gradient(180deg, #ef4444 0%, #b91c1c 100%); box-shadow: 0 0 6px #ef444488; }
    .uptime-footer { display: flex; justify-content: space-between; }
    .uptime-label { font-size: 11px; color: #556; }
    .uptime-pct { font-size: 13px; color: #22c55e; font-family: 'Orbitron', sans-serif; font-weight: 600; }

    /* APOD */
    .apod-content { display: flex; gap: 16px; align-items: flex-start; }
    .apod-img {
      width: 200px; height: 140px; object-fit: cover;
      border-radius: 4px; border: 1px solid #1a2332; flex-shrink: 0;
    }
    .apod-title { font-size: 15px; font-family: 'Orbitron', sans-serif; color: #e2e8f0; font-weight: 600; margin-bottom: 6px; line-height: 1.3; }
    .apod-date { font-size: 10px; color: #00ffc8; letter-spacing: 1px; margin-bottom: 8px; }
    .apod-desc { font-size: 12px; color: #778899; line-height: 1.5; max-height: 80px; overflow: hidden; }
    @media (max-width: 768px) {
      .apod-content { flex-direction: column; }
      .apod-img { width: 100%; height: 180px; }
    }

    /* Footer */
    .footer { text-align: center; margin-top: 20px; font-size: 10px; color: #222a34; letter-spacing: 2px; }

    /* Boot */
    .boot-screen {
      min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 32px;
    }
    .boot-line { font-size: 13px; margin-bottom: 4px; animation: fadeIn 0.2s ease; }
    .boot-line.ok { color: #22c55e; }
    .boot-line.welcome { color: #00ffc8; }
    .boot-line.normal { color: #5a6a7a; }

    /* Hourly forecast mini chart */
    .forecast-row { display: flex; gap: 8px; margin-top: 12px; overflow-x: auto; padding-bottom: 4px; }
    .forecast-hour { text-align: center; min-width: 44px; }
    .forecast-hour-label { font-size: 9px; color: #556; letter-spacing: 1px; }
    .forecast-hour-icon { font-size: 16px; margin: 2px 0; }
    .forecast-hour-temp { font-size: 11px; color: #8892a4; font-family: 'Orbitron', sans-serif; }
  </style>
</head>
<body>

<div id="root"></div>

<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

const SOFIA_LAT = 42.6977;
const SOFIA_LON = 23.3219;
const REFRESH_INTERVAL = 5 * 60 * 1000; // 5 min
const fmt = (n) => (n < 10 ? `0${n}` : `${n}`);

const clockZones = [
  { label: "SOFIA", tz: "Europe/Sofia" },
  { label: "UTC", tz: "UTC" },
  { label: "NEW YORK", tz: "America/New_York" },
  { label: "TOKYO", tz: "Asia/Tokyo" },
];

const weatherCodes = {
  0: { icon: "☀️", label: "Clear sky" },
  1: { icon: "🌤", label: "Mainly clear" },
  2: { icon: "⛅", label: "Partly cloudy" },
  3: { icon: "☁️", label: "Overcast" },
  45: { icon: "🌫", label: "Fog" },
  48: { icon: "🌫", label: "Rime fog" },
  51: { icon: "🌦", label: "Light drizzle" },
  53: { icon: "🌦", label: "Drizzle" },
  55: { icon: "🌧", label: "Dense drizzle" },
  61: { icon: "🌧", label: "Slight rain" },
  63: { icon: "🌧", label: "Rain" },
  65: { icon: "🌧", label: "Heavy rain" },
  71: { icon: "🌨", label: "Slight snow" },
  73: { icon: "🌨", label: "Snow" },
  75: { icon: "❄️", label: "Heavy snow" },
  80: { icon: "🌦", label: "Rain showers" },
  81: { icon: "🌧", label: "Heavy showers" },
  95: { icon: "⛈", label: "Thunderstorm" },
};

// ─── Card wrapper ───
function Card({ title, status, children, className="" }) {
  const statusClass = status === "LIVE" ? "live" : status === "ERR" ? "err" : "loading";
  const dotClass = status === "LIVE" ? "blink-green" : "blink-orange";
  return (
    <div className={`card ${className}`}>
      <div className="card-header">
        <span className="card-title">{title}</span>
        {status && (
          <span className={`card-status ${statusClass}`}>
            <span className={`blink-dot ${dotClass}`} />
            {status}
          </span>
        )}
      </div>
      {children}
    </div>
  );
}

// ─── Weather ───
function WeatherCard() {
  const [data, setData] = useState(null);
  const [forecast, setForecast] = useState(null);
  const [err, setErr] = useState(false);
  const [lastUpdate, setLastUpdate] = useState(null);

  const load = () => {
    fetch(
      `https://api.open-meteo.com/v1/forecast?latitude=${SOFIA_LAT}&longitude=${SOFIA_LON}` +
      `&current=temperature_2m,relative_humidity_2m,wind_speed_10m,weather_code,apparent_temperature` +
      `&hourly=temperature_2m,weather_code&timezone=Europe%2FSofia&forecast_hours=8`
    )
      .then((r) => r.json())
      .then((d) => {
        setData(d.current);
        if (d.hourly) {
          const hours = d.hourly.time.map((t, i) => ({
            time: new Date(t).getHours(),
            temp: Math.round(d.hourly.temperature_2m[i]),
            code: d.hourly.weather_code[i],
          }));
          setForecast(hours);
        }
        setLastUpdate(new Date());
        setErr(false);
      })
      .catch(() => setErr(true));
  };

  useEffect(() => { load(); const iv = setInterval(load, REFRESH_INTERVAL); return () => clearInterval(iv); }, []);

  const wc = data ? weatherCodes[data.weather_code] || { icon: "🌍", label: "Unknown" } : null;

  return (
    <Card title="Weather — Sofia" status={data ? "LIVE" : err ? "ERR" : "..."}>
      {data ? (
        <div>
          <div className="weather-main">
            <span className="weather-icon">{wc.icon}</span>
            <div>
              <div className="weather-temp">{Math.round(data.temperature_2m)}°C</div>
              <div className="weather-desc">
                {wc.label} · Feels {Math.round(data.apparent_temperature)}°C
              </div>
            </div>
          </div>
          <div className="weather-stats">
            <div>
              <div className="stat-label">Humidity</div>
              <div><span className="stat-value" style={{color:"#38bdf8"}}>{data.relative_humidity_2m}</span><span className="stat-unit">%</span></div>
            </div>
            <div>
              <div className="stat-label">Wind</div>
              <div><span className="stat-value" style={{color:"#f59e42"}}>{data.wind_speed_10m}</span><span className="stat-unit">km/h</span></div>
            </div>
          </div>
          {forecast && (
            <div className="forecast-row">
              {forecast.map((h, i) => {
                const fc = weatherCodes[h.code] || { icon: "🌍" };
                return (
                  <div className="forecast-hour" key={i}>
                    <div className="forecast-hour-label">{fmt(h.time)}:00</div>
                    <div className="forecast-hour-icon">{fc.icon}</div>
                    <div className="forecast-hour-temp">{h.temp}°</div>
                  </div>
                );
              })}
            </div>
          )}
        </div>
      ) : (
        <div style={{color:"#556",fontSize:13}}>{err ? "⚠ Failed to fetch" : "Loading..."}</div>
      )}
    </Card>
  );
}

// ─── World Clock ───
function WorldClock() {
  const [now, setNow] = useState(new Date());
  useEffect(() => { const i = setInterval(() => setNow(new Date()), 1000); return () => clearInterval(i); }, []);
  return (
    <Card title="World Clock" status="LIVE">
      <div className="clocks">
        {clockZones.map((z) => {
          const d = new Date(now.toLocaleString("en-US", { timeZone: z.tz }));
          return (
            <div key={z.label}>
              <div className="clock-label">{z.label}</div>
              <div className={`clock-time ${z.label === "SOFIA" ? "primary" : ""}`}>
                {fmt(d.getHours())}:{fmt(d.getMinutes())}:{fmt(d.getSeconds())}
              </div>
            </div>
          );
        })}
      </div>
    </Card>
  );
}

// ─── Crypto ───
function CryptoCard() {
  const [coins, setCoins] = useState(null);
  const [err, setErr] = useState(false);

  const load = () => {
    fetch("https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&ids=bitcoin,ethereum,solana&order=market_cap_desc&sparkline=false")
      .then((r) => r.json())
      .then((d) => { if (Array.isArray(d)) { setCoins(d); setErr(false); } else setErr(true); })
      .catch(() => setErr(true));
  };

  useEffect(() => { load(); const iv = setInterval(load, REFRESH_INTERVAL); return () => clearInterval(iv); }, []);

  const fmtPrice = (p) => p >= 1000 ? `$${(p/1000).toFixed(1)}k` : p >= 1 ? `$${p.toFixed(2)}` : `$${p.toFixed(4)}`;

  return (
    <Card title="Crypto Ticker" status={coins ? "LIVE" : err ? "ERR" : "..."}>
      {coins ? coins.map((c) => {
        const up = c.price_change_percentage_24h >= 0;
        return (
          <div className="coin-row" key={c.id}>
            <div className="coin-info">
              <img src={c.image} alt="" className="coin-icon" />
              <span className="coin-symbol">{c.symbol.toUpperCase()}</span>
            </div>
            <div style={{textAlign:"right"}}>
              <div className="coin-price">{fmtPrice(c.current_price)}</div>
              <div className={`coin-change ${up?"up":"down"}`}>{up?"▲":"▼"} {Math.abs(c.price_change_percentage_24h).toFixed(2)}%</div>
            </div>
          </div>
        );
      }) : (
        <div style={{color:"#556",fontSize:13}}>{err ? "⚠ Rate limited — retry in 60s" : "Loading..."}</div>
      )}
    </Card>
  );
}

// ─── NASA APOD ───
function APODCard() {
  const [apod, setApod] = useState(null);
  const [err, setErr] = useState(false);

  useEffect(() => {
    fetch("https://api.nasa.gov/planetary/apod?api_key=DEMO_KEY")
      .then((r) => r.json())
      .then((d) => { if (d.url) setApod(d); else setErr(true); })
      .catch(() => setErr(true));
  }, []);

  return (
    <Card title="NASA — Astronomy Picture of the Day" status={apod ? "LIVE" : err ? "ERR" : "..."} className="span-2">
      {apod ? (
        <div className="apod-content">
          {apod.media_type === "video" ? (
            <iframe src={apod.url} style={{width:200,height:140,border:"1px solid #1a2332",borderRadius:4,flexShrink:0}} allowFullScreen />
          ) : (
            <img src={apod.url} alt={apod.title} className="apod-img" />
          )}
          <div style={{minWidth:0}}>
            <div className="apod-title">{apod.title}</div>
            <div className="apod-date">{apod.date}</div>
            <div className="apod-desc">{apod.explanation?.slice(0, 280)}…</div>
          </div>
        </div>
      ) : (
        <div style={{color:"#556",fontSize:13}}>{err ? "⚠ Failed to fetch" : "Loading..."}</div>
      )}
    </Card>
  );
}

// ─── Uptime (simulated — replace with your real monitoring API) ───
function UptimeBar() {
  const [days] = useState(() =>
    Array.from({ length: 30 }, (_, i) => ({ day: i + 1, up: Math.random() > 0.06 }))
  );
  const upCount = days.filter((d) => d.up).length;
  const pct = ((upCount / 30) * 100).toFixed(1);

  return (
    <Card title="Uptime — Last 30 Days">
      <div className="uptime-bars">
        {days.map((d) => (
          <div key={d.day} className={`uptime-bar ${d.up ? "ok" : "down"}`} title={`Day ${d.day}: ${d.up?"OK":"DOWN"}`} />
        ))}
      </div>
      <div className="uptime-footer">
        <span className="uptime-label">30 days ago</span>
        <span className="uptime-pct">{pct}%</span>
        <span className="uptime-label">today</span>
      </div>
    </Card>
  );
}

// ─── Boot Sequence ───
const BOOT_LINES = [
  { text: "[SYS] Initializing Mission Control v1.0.0 ...", type: "normal" },
  { text: "[NET] Connecting to Open-Meteo API .......... OK", type: "ok" },
  { text: "[NET] Connecting to CoinGecko API ........... OK", type: "ok" },
  { text: "[NET] Connecting to NASA APOD API ........... OK", type: "ok" },
  { text: "[CLK] Syncing world clocks .................. OK", type: "ok" },
  { text: "[MON] Loading uptime telemetry .............. OK", type: "ok" },
  { text: "[SYS] All systems nominal. Welcome, operator.", type: "welcome" },
];

// ─── App ───
function App() {
  const [bootDone, setBoot] = useState(false);
  const [bootLines, setBootLines] = useState([]);
  const idxRef = useRef(0);

  useEffect(() => {
    idxRef.current = 0;
    setBootLines([]);
    const iv = setInterval(() => {
      if (idxRef.current < BOOT_LINES.length) {
        const line = BOOT_LINES[idxRef.current];
        idxRef.current++;
        setBootLines((p) => [...p, line]);
      } else {
        clearInterval(iv);
        setTimeout(() => setBoot(true), 400);
      }
    }, 180);
    return () => clearInterval(iv);
  }, []);

  if (!bootDone) {
    return (
      <div className="boot-screen">
        <div style={{maxWidth:540}}>
          {bootLines.map((l, i) => (
            <div key={i} className={`boot-line ${l.type}`}>{l.text}</div>
          ))}
        </div>
      </div>
    );
  }

  return (
    <div className="dashboard">
      <div className="header">
        <div>
          <div className="header-title">MISSION CONTROL</div>
          <div className="header-sub">HOMELAB OPS DASHBOARD · v1.0.0</div>
        </div>
        <div className="header-status">
          <span className="blink-dot blink-green" />
          ALL SYSTEMS NOMINAL
        </div>
      </div>
      <div className="grid">
        <WeatherCard />
        <WorldClock />
        <CryptoCard />
        <UptimeBar />
        <APODCard />
      </div>
      <div className="footer">
        DATA SOURCES: OPEN-METEO · COINGECKO · NASA APOD · ALL FREE &amp; KEYLESS · AUTO-REFRESH 5 MIN
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
