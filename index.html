<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mission Control</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #06080c;
      font-family: 'Share Tech Mono', monospace;
      color: #c0c8d4;
      min-height: 100vh;
      overflow-x: hidden;
    }
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 9999;
      background: repeating-linear-gradient(0deg, rgba(0,0,0,0.06) 0px, rgba(0,0,0,0.06) 1px, transparent 1px, transparent 3px);
      mix-blend-mode: multiply;
    }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #06080c; }
    ::-webkit-scrollbar-thumb { background: #1a2332; border-radius: 3px; }
    @keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
    @keyframes blink { 0%,100% { opacity:1; } 50% { opacity:0; } }
    @keyframes pulse { 0%,100% { opacity:0.6; } 50% { opacity:1; } }
    @keyframes issGlow { 0%,100% { filter: drop-shadow(0 0 4px #ff3c3c); } 50% { filter: drop-shadow(0 0 10px #ff5555); } }
    .blink-dot {
      display: inline-block; width: 8px; height: 8px; border-radius: 50%;
      margin-right: 6px; animation: blink 1.4s ease-in-out infinite;
    }
    .blink-green { background: #22c55e; box-shadow: 0 0 6px #22c55e; }
    .blink-orange { background: #f59e42; box-shadow: 0 0 6px #f59e42; }

    .dashboard { padding: 24px 28px; animation: fadeIn 0.6s ease; }
    .header {
      display: flex; justify-content: space-between; align-items: flex-end;
      border-bottom: 1px solid #111822; padding-bottom: 14px; margin-bottom: 24px;
    }
    .header-title {
      font-size: 22px; font-family: 'Orbitron', sans-serif; color: #00ffc8;
      font-weight: 700; letter-spacing: 4px; text-shadow: 0 0 20px #00ffc833;
    }
    .header-sub { font-size: 11px; color: #3a4a5a; letter-spacing: 2px; margin-top: 4px; }
    .header-status { display: flex; align-items: center; gap: 6px; font-size: 11px; color: #22c55e; letter-spacing: 1px; }

    .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
    @media (max-width: 1100px) {
      .grid { grid-template-columns: repeat(2, 1fr); }
      .span-3 { grid-column: span 2 !important; }
    }
    @media (max-width: 768px) {
      .grid { grid-template-columns: 1fr; }
      .span-2, .span-3 { grid-column: span 1 !important; }
    }
    .span-2 { grid-column: span 2; }
    .span-3 { grid-column: span 3; }

    .card {
      background: linear-gradient(165deg, #0d1117 0%, #0a0e14 100%);
      border: 1px solid #1a2332; border-radius: 6px;
      padding: 16px 20px; position: relative; overflow: hidden;
    }
    .card::before {
      content: ''; position: absolute; top: 0; left: 0;
      width: 40px; height: 2px; background: #00ffc8; opacity: 0.6;
    }
    .card::after {
      content: ''; position: absolute; top: 0; left: 0;
      width: 2px; height: 24px; background: #00ffc8; opacity: 0.6;
    }
    .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
    .card-title { font-size: 11px; letter-spacing: 3px; color: #5a6a7a; text-transform: uppercase; }
    .card-status { font-size: 9px; letter-spacing: 1px; display: flex; align-items: center; }
    .card-status.live { color: #0f0; }
    .card-status.err { color: #f80; }
    .card-status.loading { color: #556; }

    .stat-label { font-size: 10px; letter-spacing: 2px; color: #667; text-transform: uppercase; }
    .stat-value { font-size: 26px; font-weight: 700; font-family: 'Orbitron', sans-serif; }
    .stat-unit { font-size: 12px; color: #889; margin-left: 4px; }

    .weather-main { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
    .weather-icon { font-size: 42px; }
    .weather-temp {
      font-size: 36px; font-family: 'Orbitron', sans-serif; color: #00ffc8;
      font-weight: 700; text-shadow: 0 0 18px #00ffc844; line-height: 1;
    }
    .weather-desc { font-size: 12px; color: #667; margin-top: 2px; }
    .weather-stats { display: flex; gap: 24px; margin-bottom: 12px; }

    .hourly-chart { display: flex; align-items: flex-end; gap: 3px; height: 80px; margin-top: 8px; }
    .hourly-bar-wrap { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; }
    .hourly-bar {
      width: 100%; border-radius: 2px 2px 0 0; min-height: 4px;
      background: linear-gradient(180deg, #00ffc8 0%, #00ffc833 100%);
      transition: height 0.3s ease;
    }
    .hourly-temp { font-size: 9px; color: #8892a4; font-family: 'Orbitron', sans-serif; }
    .hourly-time { font-size: 8px; color: #445; letter-spacing: 1px; }
    .hourly-icon { font-size: 12px; line-height: 1; }

    .clocks { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .clock-label { font-size: 9px; letter-spacing: 2px; color: #556; margin-bottom: 2px; }
    .clock-time { font-size: 20px; font-family: 'Orbitron', sans-serif; color: #8892a4; }
    .clock-time.primary { color: #00ffc8; text-shadow: 0 0 10px #00ffc844; }

    .coin-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 6px 10px; background: #0b1018; border-radius: 4px;
      border: 1px solid #151d28; margin-bottom: 6px;
    }
    .coin-row:last-child { margin-bottom: 0; }
    .coin-info { display: flex; align-items: center; gap: 8px; }
    .coin-icon { width: 20px; height: 20px; border-radius: 10px; }
    .coin-symbol { font-size: 12px; font-family: 'Orbitron', sans-serif; color: #c0c8d4; letter-spacing: 1px; }
    .coin-price { font-size: 15px; font-family: 'Orbitron', sans-serif; color: #e2e8f0; font-weight: 600; }
    .coin-change { font-size: 11px; }
    .coin-change.up { color: #22c55e; }
    .coin-change.down { color: #ef4444; }

    .service-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 8px 10px; background: #0b1018; border-radius: 4px;
      border: 1px solid #151d28; margin-bottom: 6px;
    }
    .service-row:last-child { margin-bottom: 0; }
    .service-name { font-size: 12px; color: #c0c8d4; display: flex; align-items: center; gap: 8px; }
    .service-badge {
      font-size: 9px; letter-spacing: 1px; padding: 2px 8px; border-radius: 3px;
      font-family: 'Orbitron', sans-serif; font-weight: 600;
    }
    .service-badge.up { background: #22c55e22; color: #22c55e; border: 1px solid #22c55e44; }
    .service-badge.down { background: #ef444422; color: #ef4444; border: 1px solid #ef444444; }
    .service-badge.checking { background: #f59e4222; color: #f59e42; border: 1px solid #f59e4244; }
    .service-latency { font-size: 11px; color: #556; }
    .service-dot { width: 6px; height: 6px; border-radius: 50%; display: inline-block; }
    .service-dot.up { background: #22c55e; box-shadow: 0 0 4px #22c55e; }
    .service-dot.down { background: #ef4444; box-shadow: 0 0 4px #ef4444; }
    .service-dot.checking { background: #f59e42; animation: pulse 1s infinite; }

    .iss-map svg { width: 100%; height: auto; display: block; }
    .iss-info { display: flex; gap: 20px; margin-top: 10px; flex-wrap: wrap; }

    .net-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .net-stat { text-align: center; padding: 8px; background: #0b1018; border-radius: 4px; border: 1px solid #151d28; }
    .net-value { font-size: 22px; font-family: 'Orbitron', sans-serif; font-weight: 600; line-height: 1.2; }
    .net-label { font-size: 9px; letter-spacing: 2px; color: #556; text-transform: uppercase; margin-top: 4px; }
    .net-bar-wrap { grid-column: span 2; padding: 8px; background: #0b1018; border-radius: 4px; border: 1px solid #151d28; }
    .net-bar-label { font-size: 9px; letter-spacing: 2px; color: #556; text-transform: uppercase; margin-bottom: 6px; }
    .net-bar-track { height: 6px; background: #151d28; border-radius: 3px; overflow: hidden; }
    .net-bar-fill { height: 100%; border-radius: 3px; transition: width 0.5s ease; }

    .apod-content { display: flex; gap: 16px; align-items: flex-start; }
    .apod-img {
      width: 200px; height: 140px; object-fit: cover;
      border-radius: 4px; border: 1px solid #1a2332; flex-shrink: 0;
    }
    .apod-title { font-size: 15px; font-family: 'Orbitron', sans-serif; color: #e2e8f0; font-weight: 600; margin-bottom: 6px; line-height: 1.3; }
    .apod-date { font-size: 10px; color: #00ffc8; letter-spacing: 1px; margin-bottom: 8px; }
    .apod-desc { font-size: 12px; color: #778899; line-height: 1.5; max-height: 80px; overflow: hidden; }
    @media (max-width: 768px) {
      .apod-content { flex-direction: column; }
      .apod-img { width: 100%; height: 180px; }
    }

    .footer { text-align: center; margin-top: 20px; font-size: 10px; color: #222a34; letter-spacing: 2px; }
    .boot-screen { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 32px; }
    .boot-line { font-size: 13px; margin-bottom: 4px; animation: fadeIn 0.2s ease; }
    .boot-line.ok { color: #22c55e; }
    .boot-line.welcome { color: #00ffc8; }
    .boot-line.normal { color: #5a6a7a; }
  </style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script type="text/babel">
const { useState, useEffect, useRef, useMemo } = React;

const CONFIG = {
  weatherLat: 42.6977,
  weatherLon: 23.3219,
  weatherCity: "Sofia",
  refreshInterval: 5 * 60 * 1000,
  issRefreshInterval: 10 * 1000,
  services: [
    { name: "Mailhub", url: "https://mailhub.dporkov.tech/" },
    { name: "Code Poets Society", url: "https://codepoetssociety.info" },
    { name: "Mission Control", url: "https://mission-control.dporkov.tech" },
  ],
  cryptoIds: "bitcoin,ethereum,solana",
};

const fmt = (n) => (n < 10 ? `0${n}` : `${n}`);
const clockZones = [
  { label: "SOFIA", tz: "Europe/Sofia" },
  { label: "UTC", tz: "UTC" },
  { label: "NEW YORK", tz: "America/New_York" },
  { label: "TOKYO", tz: "Asia/Tokyo" },
];
const weatherCodes = {
  0:{icon:"☀️",label:"Clear sky"},1:{icon:"🌤",label:"Mainly clear"},2:{icon:"⛅",label:"Partly cloudy"},
  3:{icon:"☁️",label:"Overcast"},45:{icon:"🌫",label:"Fog"},48:{icon:"🌫",label:"Rime fog"},
  51:{icon:"🌦",label:"Light drizzle"},53:{icon:"🌦",label:"Drizzle"},55:{icon:"🌧",label:"Dense drizzle"},
  61:{icon:"🌧",label:"Slight rain"},63:{icon:"🌧",label:"Rain"},65:{icon:"🌧",label:"Heavy rain"},
  71:{icon:"🌨",label:"Slight snow"},73:{icon:"🌨",label:"Snow"},75:{icon:"❄️",label:"Heavy snow"},
  80:{icon:"🌦",label:"Rain showers"},81:{icon:"🌧",label:"Heavy showers"},95:{icon:"⛈",label:"Thunderstorm"},
};

function Card({ title, status, children, className="" }) {
  const sc = status === "LIVE" ? "live" : status === "ERR" ? "err" : "loading";
  const dc = status === "LIVE" ? "blink-green" : "blink-orange";
  return (
    <div className={`card ${className}`}>
      <div className="card-header">
        <span className="card-title">{title}</span>
        {status && <span className={`card-status ${sc}`}><span className={`blink-dot ${dc}`}/>{status}</span>}
      </div>
      {children}
    </div>
  );
}

function WeatherCard() {
  const [data, setData] = useState(null);
  const [hourly, setHourly] = useState(null);
  const [err, setErr] = useState(false);
  const load = () => {
    fetch(`https://api.open-meteo.com/v1/forecast?latitude=${CONFIG.weatherLat}&longitude=${CONFIG.weatherLon}&current=temperature_2m,relative_humidity_2m,wind_speed_10m,weather_code,apparent_temperature&hourly=temperature_2m,weather_code&timezone=auto&forecast_hours=12`)
      .then(r => r.json())
      .then(d => {
        setData(d.current);
        if (d.hourly) setHourly(d.hourly.time.map((t,i) => ({time:new Date(t).getHours(),temp:Math.round(d.hourly.temperature_2m[i]),code:d.hourly.weather_code[i]})));
        setErr(false);
      }).catch(() => setErr(true));
  };
  useEffect(() => { load(); const iv = setInterval(load, CONFIG.refreshInterval); return () => clearInterval(iv); }, []);
  const wc = data ? weatherCodes[data.weather_code] || {icon:"🌍",label:"Unknown"} : null;
  const range = useMemo(() => {
    if (!hourly) return {min:0,max:30};
    const t = hourly.map(h=>h.temp);
    return {min:Math.min(...t)-2, max:Math.max(...t)+2};
  }, [hourly]);

  return (
    <Card title={`Weather — ${CONFIG.weatherCity}`} status={data?"LIVE":err?"ERR":"..."} className="span-2">
      {data ? (<div>
        <div className="weather-main">
          <span className="weather-icon">{wc.icon}</span>
          <div>
            <div className="weather-temp">{Math.round(data.temperature_2m)}°C</div>
            <div className="weather-desc">{wc.label} · Feels {Math.round(data.apparent_temperature)}°C</div>
          </div>
        </div>
        <div className="weather-stats">
          <div><div className="stat-label">Humidity</div><div><span className="stat-value" style={{color:"#38bdf8",fontSize:20}}>{data.relative_humidity_2m}</span><span className="stat-unit">%</span></div></div>
          <div><div className="stat-label">Wind</div><div><span className="stat-value" style={{color:"#f59e42",fontSize:20}}>{data.wind_speed_10m}</span><span className="stat-unit">km/h</span></div></div>
        </div>
        {hourly && (<div>
          <div className="stat-label" style={{marginBottom:6}}>12h Forecast</div>
          <div className="hourly-chart">
            {hourly.map((h,i) => {
              const r = range.max - range.min;
              const pct = r > 0 ? ((h.temp - range.min) / r) * 100 : 50;
              const fc = weatherCodes[h.code] || {icon:"🌍"};
              return (<div className="hourly-bar-wrap" key={i}>
                <div className="hourly-icon">{fc.icon}</div>
                <div className="hourly-temp">{h.temp}°</div>
                <div style={{flex:1,width:'100%',display:'flex',alignItems:'flex-end'}}>
                  <div className="hourly-bar" style={{height:`${Math.max(pct,8)}%`,width:'100%'}}/>
                </div>
                <div className="hourly-time">{fmt(h.time)}</div>
              </div>);
            })}
          </div>
        </div>)}
      </div>) : <div style={{color:"#556",fontSize:13}}>{err?"⚠ Failed to fetch":"Loading..."}</div>}
    </Card>
  );
}

function WorldClock() {
  const [now, setNow] = useState(new Date());
  useEffect(() => { const i = setInterval(() => setNow(new Date()), 1000); return () => clearInterval(i); }, []);
  return (
    <Card title="World Clock" status="LIVE">
      <div className="clocks">
        {clockZones.map(z => {
          const d = new Date(now.toLocaleString("en-US", {timeZone:z.tz}));
          return (<div key={z.label}>
            <div className="clock-label">{z.label}</div>
            <div className={`clock-time ${z.label==="SOFIA"?"primary":""}`}>{fmt(d.getHours())}:{fmt(d.getMinutes())}:{fmt(d.getSeconds())}</div>
          </div>);
        })}
      </div>
    </Card>
  );
}

function ServiceHealth() {
  const [services, setServices] = useState(CONFIG.services.map(s => ({...s, status:"checking", latency:null})));
  const check = () => {
    CONFIG.services.forEach((svc, idx) => {
      const start = performance.now();
      const ctrl = new AbortController();
      const to = setTimeout(() => ctrl.abort(), 8000);
      fetch(svc.url, {mode:'no-cors', signal:ctrl.signal, cache:'no-store'})
        .then(() => { clearTimeout(to); const ms = Math.round(performance.now()-start); setServices(p => { const n=[...p]; n[idx]={...svc,status:"up",latency:ms}; return n; }); })
        .catch(() => { clearTimeout(to); setServices(p => { const n=[...p]; n[idx]={...svc,status:"down",latency:null}; return n; }); });
    });
  };
  useEffect(() => { check(); const iv = setInterval(check, 60000); return () => clearInterval(iv); }, []);
  const allUp = services.every(s => s.status==="up");
  const anyCheck = services.some(s => s.status==="checking");
  return (
    <Card title="Service Health" status={anyCheck?"...":allUp?"LIVE":"ERR"}>
      {services.map((svc,i) => (
        <div className="service-row" key={i}>
          <div className="service-name"><span className={`service-dot ${svc.status}`}/>{svc.name}</div>
          <div style={{display:'flex',alignItems:'center',gap:10}}>
            {svc.latency !== null && <span className="service-latency">{svc.latency}ms</span>}
            <span className={`service-badge ${svc.status}`}>{svc.status==="up"?"ONLINE":svc.status==="down"?"DOWN":"CHECK"}</span>
          </div>
        </div>
      ))}
    </Card>
  );
}

function ISSTracker() {
  const [pos, setPos] = useState(null);
  const [trail, setTrail] = useState([]);
  const [err, setErr] = useState(false);
  const load = () => {
    fetch("https://api.wheretheiss.at/v1/satellites/25544")
      .then(r => r.json())
      .then(d => {
        const pt = {lat:d.latitude,lon:d.longitude};
        setPos({...pt,alt:d.altitude,vel:d.velocity,vis:d.visibility});
        setTrail(p => [...p.slice(-30),pt]);
        setErr(false);
      }).catch(() => setErr(true));
  };
  useEffect(() => { load(); const iv = setInterval(load, CONFIG.issRefreshInterval); return () => clearInterval(iv); }, []);
  const toX = lon => ((lon+180)/360)*800;
  const toY = lat => ((90-lat)/180)*400;
  return (
    <Card title="ISS Live Tracker" status={pos?"LIVE":err?"ERR":"..."} className="span-2">
      {pos ? (<div>
        <div style={{borderRadius:4,overflow:'hidden'}}>
          <svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg" style={{background:'#080c12',display:'block'}}>
            {[...Array(7)].map((_,i) => <line key={`h${i}`} x1="0" y1={i*66.6} x2="800" y2={i*66.6} stroke="#111822" strokeWidth="0.5"/>)}
            {[...Array(9)].map((_,i) => <line key={`v${i}`} x1={i*100} y1="0" x2={i*100} y2="400" stroke="#111822" strokeWidth="0.5"/>)}
            <line x1="0" y1="200" x2="800" y2="200" stroke="#1a2332" strokeWidth="1" strokeDasharray="4,4"/>
            <line x1="400" y1="0" x2="400" y2="400" stroke="#1a2332" strokeWidth="1" strokeDasharray="4,4"/>
            <text x="160" y="140" fill="#1a2332" fontSize="10" fontFamily="Share Tech Mono">N.AMERICA</text>
            <text x="360" y="130" fill="#1a2332" fontSize="10" fontFamily="Share Tech Mono">EUROPE</text>
            <text x="360" y="200" fill="#1a2332" fontSize="10" fontFamily="Share Tech Mono">AFRICA</text>
            <text x="550" y="160" fill="#1a2332" fontSize="10" fontFamily="Share Tech Mono">ASIA</text>
            <text x="600" y="280" fill="#1a2332" fontSize="10" fontFamily="Share Tech Mono">OCEANIA</text>
            <text x="240" y="300" fill="#1a2332" fontSize="10" fontFamily="Share Tech Mono">S.AMERICA</text>
            {trail.length > 1 && <polyline points={trail.map(p=>`${toX(p.lon)},${toY(p.lat)}`).join(' ')} fill="none" stroke="#ff3c3c" strokeWidth="1.5" opacity="0.4"/>}
            <circle cx={toX(pos.lon)} cy={toY(pos.lat)} r="10" fill="#ff3c3c" opacity="0.15" style={{animation:'pulse 2s infinite'}}/>
            <circle cx={toX(pos.lon)} cy={toY(pos.lat)} r="4" fill="#ff3c3c" style={{animation:'issGlow 2s infinite'}}/>
            <text x={toX(pos.lon)+10} y={toY(pos.lat)-8} fill="#ff6b6b" fontSize="9" fontFamily="Orbitron">ISS</text>
            <circle cx={toX(23.32)} cy={toY(42.70)} r="3" fill="#00ffc8" opacity="0.8"/>
            <text x={toX(23.32)+6} y={toY(42.70)+3} fill="#00ffc855" fontSize="8" fontFamily="Share Tech Mono">SOFIA</text>
          </svg>
        </div>
        <div className="iss-info">
          <div><div className="stat-label">Latitude</div><div style={{color:'#ff6b6b',fontSize:14,fontFamily:'Orbitron'}}>{pos.lat.toFixed(4)}°</div></div>
          <div><div className="stat-label">Longitude</div><div style={{color:'#ff6b6b',fontSize:14,fontFamily:'Orbitron'}}>{pos.lon.toFixed(4)}°</div></div>
          <div><div className="stat-label">Altitude</div><div style={{color:'#8892a4',fontSize:14,fontFamily:'Orbitron'}}>{pos.alt.toFixed(1)} km</div></div>
          <div><div className="stat-label">Speed</div><div style={{color:'#8892a4',fontSize:14,fontFamily:'Orbitron'}}>{pos.vel.toFixed(0)} km/h</div></div>
          <div><div className="stat-label">Visibility</div><div style={{color:pos.vis==='daylight'?'#f59e42':'#38bdf8',fontSize:14,fontFamily:'Orbitron'}}>{pos.vis||'N/A'}</div></div>
        </div>
      </div>) : <div style={{color:"#556",fontSize:13}}>{err?"⚠ Failed to fetch":"Loading..."}</div>}
    </Card>
  );
}

function NetworkStats() {
  const [stats, setStats] = useState({latency:null,jitter:null,samples:[]});
  const [testing, setTesting] = useState(false);
  const run = async () => {
    setTesting(true);
    const samples = [];
    const urls = ['https://api.open-meteo.com/v1/forecast?latitude=0&longitude=0&current=temperature_2m','https://api.wheretheiss.at/v1/satellites/25544','https://api.coingecko.com/api/v3/ping'];
    for (let i=0; i<5; i++) {
      const start = performance.now();
      try { await fetch(urls[i%urls.length],{cache:'no-store'}); samples.push(Math.round(performance.now()-start)); } catch {}
    }
    if (samples.length > 0) {
      const avg = Math.round(samples.reduce((a,b)=>a+b,0)/samples.length);
      const diffs = samples.slice(1).map((s,i)=>Math.abs(s-samples[i]));
      const jitter = diffs.length>0 ? Math.round(diffs.reduce((a,b)=>a+b,0)/diffs.length) : 0;
      setStats({latency:avg,jitter,samples});
    }
    setTesting(false);
  };
  useEffect(() => { run(); const iv = setInterval(run, 120000); return () => clearInterval(iv); }, []);
  const color = ms => { if(ms===null) return '#556'; if(ms<100) return '#22c55e'; if(ms<300) return '#f59e42'; return '#ef4444'; };
  const label = ms => { if(ms===null) return 'N/A'; if(ms<100) return 'EXCELLENT'; if(ms<300) return 'GOOD'; return 'POOR'; };
  return (
    <Card title="Network Stats" status={stats.latency!==null?"LIVE":testing?"...":"ERR"}>
      <div className="net-grid">
        <div className="net-stat"><div className="net-value" style={{color:color(stats.latency)}}>{stats.latency??'--'}</div><div className="net-label">AVG Latency (ms)</div></div>
        <div className="net-stat"><div className="net-value" style={{color:'#38bdf8'}}>{stats.jitter??'--'}</div><div className="net-label">Jitter (ms)</div></div>
        <div className="net-bar-wrap">
          <div className="net-bar-label">Quality: {label(stats.latency)}{testing && <span style={{color:'#f59e42',marginLeft:8}}>● testing</span>}</div>
          <div className="net-bar-track"><div className="net-bar-fill" style={{width:stats.latency!==null?`${Math.max(100-(stats.latency/5),5)}%`:'0%',background:`linear-gradient(90deg, ${color(stats.latency)}, ${color(stats.latency)}88)`}}/></div>
        </div>
        {stats.samples.length > 0 && (
          <div className="net-bar-wrap" style={{gridColumn:'span 2'}}>
            <div className="net-bar-label">Ping Samples</div>
            <div style={{display:'flex',gap:4,alignItems:'flex-end',height:40}}>
              {stats.samples.map((s,i) => (
                <div key={i} style={{flex:1,height:`${Math.min((s/Math.max(...stats.samples))*100,100)}%`,background:color(s),borderRadius:'2px 2px 0 0',minHeight:4,opacity:0.8,position:'relative'}}>
                  <span style={{position:'absolute',top:-14,left:'50%',transform:'translateX(-50%)',fontSize:8,color:'#667',whiteSpace:'nowrap'}}>{s}ms</span>
                </div>
              ))}
            </div>
          </div>
        )}
      </div>
    </Card>
  );
}

function CryptoCard() {
  const [coins, setCoins] = useState(null);
  const [err, setErr] = useState(false);
  const load = () => {
    fetch(`https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&ids=${CONFIG.cryptoIds}&order=market_cap_desc&sparkline=false`)
      .then(r => r.json())
      .then(d => { if(Array.isArray(d)){setCoins(d);setErr(false);} else setErr(true); })
      .catch(() => setErr(true));
  };
  useEffect(() => { load(); const iv = setInterval(load, CONFIG.refreshInterval); return () => clearInterval(iv); }, []);
  const fmtP = p => p>=1000?`$${(p/1000).toFixed(1)}k`:p>=1?`$${p.toFixed(2)}`:`$${p.toFixed(4)}`;
  return (
    <Card title="Crypto Ticker" status={coins?"LIVE":err?"ERR":"..."}>
      {coins ? coins.map(c => {
        const up = c.price_change_percentage_24h >= 0;
        return (<div className="coin-row" key={c.id}>
          <div className="coin-info"><img src={c.image} alt="" className="coin-icon"/><span className="coin-symbol">{c.symbol.toUpperCase()}</span></div>
          <div style={{textAlign:"right"}}><div className="coin-price">{fmtP(c.current_price)}</div><div className={`coin-change ${up?"up":"down"}`}>{up?"▲":"▼"} {Math.abs(c.price_change_percentage_24h).toFixed(2)}%</div></div>
        </div>);
      }) : <div style={{color:"#556",fontSize:13}}>{err?"⚠ Rate limited — retry in 60s":"Loading..."}</div>}
    </Card>
  );
}

function APODCard() {
  const [apod, setApod] = useState(null);
  const [err, setErr] = useState(false);
  useEffect(() => {
    fetch("https://api.nasa.gov/planetary/apod?api_key=DEMO_KEY")
      .then(r => r.json())
      .then(d => { if(d.url) setApod(d); else setErr(true); })
      .catch(() => setErr(true));
  }, []);
  return (
    <Card title="NASA — Astronomy Picture of the Day" status={apod?"LIVE":err?"ERR":"..."} className="span-3">
      {apod ? (<div className="apod-content">
        {apod.media_type==="video" ? <iframe src={apod.url} style={{width:200,height:140,border:"1px solid #1a2332",borderRadius:4,flexShrink:0}} allowFullScreen/> : <img src={apod.url} alt={apod.title} className="apod-img"/>}
        <div style={{minWidth:0}}>
          <div className="apod-title">{apod.title}</div>
          <div className="apod-date">{apod.date}</div>
          <div className="apod-desc">{apod.explanation?.slice(0,350)}…</div>
        </div>
      </div>) : <div style={{color:"#556",fontSize:13}}>{err?"⚠ NASA rate limited — get a free key at api.nasa.gov":"Loading..."}</div>}
    </Card>
  );
}

const BOOT_LINES = [
  {text:"[SYS] Initializing Mission Control v1.0.0 ...",type:"normal"},
  {text:"[NET] Connecting to Open-Meteo API .......... OK",type:"ok"},
  {text:"[NET] Connecting to CoinGecko API ........... OK",type:"ok"},
  {text:"[NET] Connecting to NASA APOD API ........... OK",type:"ok"},
  {text:"[SAT] Tracking ISS orbit .................... OK",type:"ok"},
  {text:"[MON] Pinging services ...................... OK",type:"ok"},
  {text:"[NET] Running network diagnostics ........... OK",type:"ok"},
  {text:"[CLK] Syncing world clocks .................. OK",type:"ok"},
  {text:"[SYS] All systems nominal. Welcome, operator.",type:"welcome"},
];

function App() {
  const [bootDone, setBoot] = useState(false);
  const [bootLines, setBootLines] = useState([]);
  const idxRef = useRef(0);
  useEffect(() => {
    idxRef.current = 0; setBootLines([]);
    const iv = setInterval(() => {
      if (idxRef.current < BOOT_LINES.length) { const l = BOOT_LINES[idxRef.current]; idxRef.current++; setBootLines(p => [...p, l]); }
      else { clearInterval(iv); setTimeout(() => setBoot(true), 400); }
    }, 150);
    return () => clearInterval(iv);
  }, []);

  if (!bootDone) return (
    <div className="boot-screen"><div style={{maxWidth:540}}>
      {bootLines.map((l,i) => <div key={i} className={`boot-line ${l.type}`}>{l.text}</div>)}
    </div></div>
  );

  return (
    <div className="dashboard">
      <div className="header">
        <div>
          <div className="header-title">MISSION CONTROL</div>
          <div className="header-sub">HOMELAB OPS DASHBOARD · v1.0.0</div>
        </div>
        <div className="header-status"><span className="blink-dot blink-green"/>ALL SYSTEMS NOMINAL</div>
      </div>
      <div className="grid">
        <WeatherCard />
        <WorldClock />
        <ISSTracker />
        <ServiceHealth />
        <CryptoCard />
        <NetworkStats />
        <APODCard />
      </div>
      <div className="footer">OPEN-METEO · COINGECKO · NASA APOD · WHERETHEISS.AT · AUTO-REFRESH</div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
