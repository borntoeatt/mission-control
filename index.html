<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mission Control</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #06080c; font-family: 'Share Tech Mono', monospace; color: #c0c8d4; min-height: 100vh; overflow-x: hidden; }
    body::after { content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 9999; background: repeating-linear-gradient(0deg, rgba(0,0,0,0.06) 0px, rgba(0,0,0,0.06) 1px, transparent 1px, transparent 3px); mix-blend-mode: multiply; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #06080c; }
    ::-webkit-scrollbar-thumb { background: #1a2332; border-radius: 3px; }
    @keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
    @keyframes blink { 0%,100% { opacity:1; } 50% { opacity:0; } }
    @keyframes pulse { 0%,100% { opacity:0.6; } 50% { opacity:1; } }
    @keyframes issGlow { 0%,100% { filter: drop-shadow(0 0 4px #ff3c3c); } 50% { filter: drop-shadow(0 0 10px #ff5555); } }
    @keyframes rocketPulse { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-3px); } }
    @keyframes sunArc { from { stroke-dashoffset: 314; } }
    .blink-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; animation: blink 1.4s ease-in-out infinite; }
    .blink-green { background: #22c55e; box-shadow: 0 0 6px #22c55e; }
    .blink-orange { background: #f59e42; box-shadow: 0 0 6px #f59e42; }

    .dashboard { padding: 24px 28px; animation: fadeIn 0.6s ease; }
    .header { display: flex; justify-content: space-between; align-items: flex-end; border-bottom: 1px solid #111822; padding-bottom: 14px; margin-bottom: 24px; }
    .header-title { font-size: 22px; font-family: 'Orbitron', sans-serif; color: #00ffc8; font-weight: 700; letter-spacing: 4px; text-shadow: 0 0 20px #00ffc833; }
    .header-sub { font-size: 11px; color: #3a4a5a; letter-spacing: 2px; margin-top: 4px; }
    .header-status { display: flex; align-items: center; gap: 6px; font-size: 11px; color: #22c55e; letter-spacing: 1px; }

    .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
    @media (max-width: 1100px) { .grid { grid-template-columns: repeat(2, 1fr); } .span-3 { grid-column: span 2 !important; } }
    @media (max-width: 768px) { .grid { grid-template-columns: 1fr; } .span-2, .span-3 { grid-column: span 1 !important; } }
    .span-2 { grid-column: span 2; }
    .span-3 { grid-column: span 3; }

    .card { background: linear-gradient(165deg, #0d1117 0%, #0a0e14 100%); border: 1px solid #1a2332; border-radius: 6px; padding: 16px 20px; position: relative; overflow: hidden; }
    .card::before { content: ''; position: absolute; top: 0; left: 0; width: 40px; height: 2px; background: #00ffc8; opacity: 0.6; }
    .card::after { content: ''; position: absolute; top: 0; left: 0; width: 2px; height: 24px; background: #00ffc8; opacity: 0.6; }
    .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
    .card-title { font-size: 11px; letter-spacing: 3px; color: #5a6a7a; text-transform: uppercase; }
    .card-status { font-size: 9px; letter-spacing: 1px; display: flex; align-items: center; }
    .card-status.live { color: #0f0; } .card-status.err { color: #f80; } .card-status.loading { color: #556; }

    .stat-label { font-size: 10px; letter-spacing: 2px; color: #667; text-transform: uppercase; }
    .stat-value { font-size: 26px; font-weight: 700; font-family: 'Orbitron', sans-serif; }
    .stat-unit { font-size: 12px; color: #889; margin-left: 4px; }

    .weather-main { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
    .weather-icon { font-size: 42px; }
    .weather-temp { font-size: 36px; font-family: 'Orbitron', sans-serif; color: #00ffc8; font-weight: 700; text-shadow: 0 0 18px #00ffc844; line-height: 1; }
    .weather-desc { font-size: 12px; color: #667; margin-top: 2px; }
    .weather-stats { display: flex; gap: 24px; margin-bottom: 12px; }
    .hourly-chart { display: flex; align-items: flex-end; gap: 3px; height: 80px; margin-top: 8px; }
    .hourly-bar-wrap { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; }
    .hourly-bar { width: 100%; border-radius: 2px 2px 0 0; min-height: 4px; background: linear-gradient(180deg, #00ffc8 0%, #00ffc833 100%); }
    .hourly-temp { font-size: 9px; color: #8892a4; font-family: 'Orbitron', sans-serif; }
    .hourly-time { font-size: 8px; color: #445; letter-spacing: 1px; }
    .hourly-icon { font-size: 12px; line-height: 1; }

    .clocks { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .clock-label { font-size: 9px; letter-spacing: 2px; color: #556; margin-bottom: 2px; }
    .clock-time { font-size: 20px; font-family: 'Orbitron', sans-serif; color: #8892a4; }
    .clock-time.primary { color: #00ffc8; text-shadow: 0 0 10px #00ffc844; }

    .service-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 10px; background: #0b1018; border-radius: 4px; border: 1px solid #151d28; margin-bottom: 6px; }
    .service-row:last-child { margin-bottom: 0; }
    .service-name { font-size: 12px; color: #c0c8d4; display: flex; align-items: center; gap: 8px; }
    .service-badge { font-size: 9px; letter-spacing: 1px; padding: 2px 8px; border-radius: 3px; font-family: 'Orbitron', sans-serif; font-weight: 600; }
    .service-badge.up { background: #22c55e22; color: #22c55e; border: 1px solid #22c55e44; }
    .service-badge.down { background: #ef444422; color: #ef4444; border: 1px solid #ef444444; }
    .service-badge.checking { background: #f59e4222; color: #f59e42; border: 1px solid #f59e4244; }
    .service-latency { font-size: 11px; color: #556; }
    .service-dot { width: 6px; height: 6px; border-radius: 50%; display: inline-block; }
    .service-dot.up { background: #22c55e; box-shadow: 0 0 4px #22c55e; }
    .service-dot.down { background: #ef4444; box-shadow: 0 0 4px #ef4444; }
    .service-dot.checking { background: #f59e42; animation: pulse 1s infinite; }

    .iss-info { display: flex; gap: 20px; margin-top: 10px; flex-wrap: wrap; }

    .quake-row { display: flex; justify-content: space-between; align-items: center; padding: 6px 10px; background: #0b1018; border-radius: 4px; border: 1px solid #151d28; margin-bottom: 5px; font-size: 11px; }
    .quake-row:last-child { margin-bottom: 0; }
    .quake-mag { font-family: 'Orbitron', sans-serif; font-weight: 700; font-size: 14px; min-width: 40px; text-align: center; }
    .quake-place { color: #8892a4; flex: 1; margin: 0 10px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .quake-time { color: #556; font-size: 10px; white-space: nowrap; }

    .launch-countdown { display: flex; gap: 10px; justify-content: center; margin: 12px 0; }
    .launch-unit { text-align: center; background: #0b1018; border: 1px solid #151d28; border-radius: 4px; padding: 8px 12px; min-width: 60px; }
    .launch-num { font-size: 24px; font-family: 'Orbitron', sans-serif; font-weight: 700; color: #ff6b35; text-shadow: 0 0 10px #ff6b3544; }
    .launch-label { font-size: 8px; letter-spacing: 2px; color: #556; text-transform: uppercase; margin-top: 4px; }
    .launch-name { font-size: 14px; font-family: 'Orbitron', sans-serif; color: #e2e8f0; font-weight: 600; text-align: center; margin-bottom: 4px; }
    .launch-detail { font-size: 11px; color: #556; text-align: center; }
    .launch-rocket { font-size: 28px; text-align: center; animation: rocketPulse 2s ease-in-out infinite; margin-bottom: 8px; }

    .pop-number { font-size: 32px; font-family: 'Orbitron', sans-serif; font-weight: 700; color: #a78bfa; text-shadow: 0 0 14px #a78bfa44; text-align: center; letter-spacing: 2px; margin: 10px 0; }
    .pop-rate { display: flex; gap: 16px; justify-content: center; }
    .pop-stat { text-align: center; }
    .pop-stat-val { font-size: 14px; font-family: 'Orbitron', sans-serif; font-weight: 600; }
    .pop-stat-label { font-size: 9px; letter-spacing: 1px; color: #556; margin-top: 2px; }

    .space-fact { font-size: 13px; color: #a0aec0; line-height: 1.6; text-align: center; padding: 10px; font-style: italic; }
    .space-fact-src { font-size: 9px; color: #445; text-align: center; margin-top: 8px; letter-spacing: 1px; }

    .visitor-count { font-size: 36px; font-family: 'Orbitron', sans-serif; font-weight: 700; color: #f472b6; text-shadow: 0 0 14px #f472b644; text-align: center; margin: 10px 0; }
    .visitor-sub { font-size: 10px; color: #556; text-align: center; letter-spacing: 1px; }

    .apod-content { display: flex; gap: 16px; align-items: flex-start; }
    .apod-img { width: 200px; height: 140px; object-fit: cover; border-radius: 4px; border: 1px solid #1a2332; flex-shrink: 0; }
    .apod-title { font-size: 15px; font-family: 'Orbitron', sans-serif; color: #e2e8f0; font-weight: 600; margin-bottom: 6px; line-height: 1.3; }
    .apod-date { font-size: 10px; color: #00ffc8; letter-spacing: 1px; margin-bottom: 8px; }
    .apod-desc { font-size: 12px; color: #778899; line-height: 1.5; max-height: 80px; overflow: hidden; }
    @media (max-width: 768px) { .apod-content { flex-direction: column; } .apod-img { width: 100%; height: 180px; } }

    /* Astronauts */
    .astro-count { font-size: 48px; font-family: 'Orbitron', sans-serif; font-weight: 700; color: #38bdf8; text-shadow: 0 0 18px #38bdf844; text-align: center; margin: 6px 0; }
    .astro-label { font-size: 11px; color: #556; text-align: center; letter-spacing: 2px; margin-bottom: 10px; }
    .astro-list { max-height: 120px; overflow-y: auto; }
    .astro-row { display: flex; justify-content: space-between; align-items: center; padding: 4px 8px; font-size: 11px; border-bottom: 1px solid #111822; }
    .astro-row:last-child { border-bottom: none; }
    .astro-name { color: #c0c8d4; }
    .astro-craft { font-size: 9px; color: #00ffc8; letter-spacing: 1px; font-family: 'Orbitron', sans-serif; }

    /* Sunrise/Sunset */
    .sun-times { display: flex; justify-content: space-around; margin: 10px 0; }
    .sun-time { text-align: center; }
    .sun-time-val { font-size: 20px; font-family: 'Orbitron', sans-serif; font-weight: 600; }
    .sun-time-label { font-size: 9px; letter-spacing: 2px; color: #556; margin-top: 4px; }
    .sun-bar { height: 6px; background: #151d28; border-radius: 3px; margin: 12px 0 6px; position: relative; overflow: hidden; }
    .sun-bar-fill { height: 100%; border-radius: 3px; background: linear-gradient(90deg, #1e3a5f, #f59e42, #ff6b35, #f59e42, #1e3a5f); }
    .sun-bar-now { position: absolute; top: -3px; width: 12px; height: 12px; border-radius: 50%; background: #fbbf24; box-shadow: 0 0 8px #fbbf24; transform: translateX(-50%); }
    .sun-info { display: flex; justify-content: space-around; margin-top: 8px; }
    .sun-info-item { text-align: center; }
    .sun-info-val { font-size: 13px; font-family: 'Orbitron', sans-serif; color: #8892a4; }
    .sun-info-label { font-size: 8px; letter-spacing: 1px; color: #445; margin-top: 2px; }

    /* NEO */
    .neo-row { display: flex; justify-content: space-between; align-items: center; padding: 6px 10px; background: #0b1018; border-radius: 4px; border: 1px solid #151d28; margin-bottom: 5px; font-size: 11px; }
    .neo-row:last-child { margin-bottom: 0; }
    .neo-name { color: #c0c8d4; font-size: 11px; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .neo-dist { font-family: 'Orbitron', sans-serif; font-size: 12px; color: #8892a4; }
    .neo-size { font-size: 10px; color: #556; }
    .neo-hazard { font-size: 9px; padding: 2px 6px; border-radius: 3px; font-family: 'Orbitron', sans-serif; font-weight: 600; }
    .neo-hazard.yes { background: #ef444422; color: #ef4444; border: 1px solid #ef444444; }
    .neo-hazard.no { background: #22c55e22; color: #22c55e; border: 1px solid #22c55e44; }

    /* Space Weather */
    .sw-event { padding: 8px 10px; background: #0b1018; border-radius: 4px; border: 1px solid #151d28; margin-bottom: 6px; }
    .sw-event:last-child { margin-bottom: 0; }
    .sw-type { font-size: 10px; letter-spacing: 2px; color: #f59e42; font-family: 'Orbitron', sans-serif; }
    .sw-time { font-size: 10px; color: #556; margin-top: 2px; }
    .sw-detail { font-size: 11px; color: #8892a4; margin-top: 4px; }
    .sw-quiet { text-align: center; color: #22c55e; font-size: 13px; padding: 16px; }

    .footer { text-align: center; margin-top: 20px; font-size: 10px; color: #222a34; letter-spacing: 2px; }
    .boot-screen { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 32px; }
    .boot-line { font-size: 13px; margin-bottom: 4px; animation: fadeIn 0.2s ease; }
    .boot-line.ok { color: #22c55e; } .boot-line.welcome { color: #00ffc8; } .boot-line.normal { color: #5a6a7a; }
  </style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script type="text/babel">
const { useState, useEffect, useRef, useMemo } = React;

const CONFIG = {
  weatherLat: 42.6977, weatherLon: 23.3219, weatherCity: "Sofia",
  refreshInterval: 5 * 60 * 1000,
  issRefreshInterval: 10 * 1000,
  nasaKey: "DEMO_KEY",
  services: [
    { name: "Mailhub", url: "https://mailhub.dporkov.tech/" },
    { name: "Code Poets Society", url: "https://codepoetssociety.info" },
    { name: "Mission Control", url: "https://mission-control.dporkov.tech" },
  ],
  populationBase: 8200000000, populationRate: 2.3,
};
const fmt = n => (n < 10 ? `0${n}` : `${n}`);
const clockZones = [{label:"SOFIA",tz:"Europe/Sofia"},{label:"UTC",tz:"UTC"},{label:"NEW YORK",tz:"America/New_York"},{label:"TOKYO",tz:"Asia/Tokyo"}];
const weatherCodes = {0:{icon:"☀️",label:"Clear sky"},1:{icon:"🌤",label:"Mainly clear"},2:{icon:"⛅",label:"Partly cloudy"},3:{icon:"☁️",label:"Overcast"},45:{icon:"🌫",label:"Fog"},48:{icon:"🌫",label:"Rime fog"},51:{icon:"🌦",label:"Light drizzle"},53:{icon:"🌦",label:"Drizzle"},55:{icon:"🌧",label:"Dense drizzle"},61:{icon:"🌧",label:"Slight rain"},63:{icon:"🌧",label:"Rain"},65:{icon:"🌧",label:"Heavy rain"},71:{icon:"🌨",label:"Slight snow"},73:{icon:"🌨",label:"Snow"},75:{icon:"❄️",label:"Heavy snow"},80:{icon:"🌦",label:"Rain showers"},81:{icon:"🌧",label:"Heavy showers"},95:{icon:"⛈",label:"Thunderstorm"}};
const SPACE_FACTS = [
  "A day on Venus is longer than its year — 243 Earth days to rotate, but only 225 to orbit the Sun.",
  "Neutron stars are so dense that a teaspoon would weigh about 6 billion tons.",
  "The ISS travels at 28,000 km/h — fast enough to circle Earth every 90 minutes.",
  "There are more stars in the universe than grains of sand on all of Earth's beaches.",
  "The Voyager 1 probe is over 24 billion km from Earth and still sending data.",
  "Saturn's density is low enough that it would float in a bathtub large enough to hold it.",
  "The Milky Way and Andromeda galaxies will collide in about 4.5 billion years.",
  "A photon from the Sun's core takes about 100,000 years to reach the surface, then 8 minutes to reach Earth.",
  "The observable universe is about 93 billion light-years in diameter.",
  "Olympus Mons on Mars is nearly 3 times the height of Mount Everest.",
  "Space is completely silent — there's no atmosphere for sound waves to travel through.",
  "The Great Red Spot on Jupiter is a storm that has been raging for over 350 years.",
  "One million Earths could fit inside the Sun.",
  "Astronauts grow up to 5 cm taller in space due to spinal decompression.",
  "The footprints on the Moon will last for 100 million years — there's no wind to erase them.",
  "Light from some stars you see tonight left before dinosaurs walked the Earth.",
  "There are rogue planets drifting through space not orbiting any star.",
  "The Sun loses about 4 million tonnes of mass every second through fusion.",
  "GPS satellites must account for both special and general relativity to stay accurate.",
  "The Andromeda galaxy is approaching us at about 110 km per second.",
];

function Card({ title, status, children, className="" }) {
  const sc = status==="LIVE"?"live":status==="ERR"?"err":"loading";
  const dc = status==="LIVE"?"blink-green":"blink-orange";
  return (<div className={`card ${className}`}><div className="card-header"><span className="card-title">{title}</span>
    {status && <span className={`card-status ${sc}`}><span className={`blink-dot ${dc}`}/>{status}</span>}</div>{children}</div>);
}

function WeatherCard() {
  const [data,setData]=useState(null); const [hourly,setHourly]=useState(null); const [err,setErr]=useState(false);
  const load=()=>{fetch(`https://api.open-meteo.com/v1/forecast?latitude=${CONFIG.weatherLat}&longitude=${CONFIG.weatherLon}&current=temperature_2m,relative_humidity_2m,wind_speed_10m,weather_code,apparent_temperature&hourly=temperature_2m,weather_code&timezone=auto&forecast_hours=12`).then(r=>r.json()).then(d=>{setData(d.current);if(d.hourly)setHourly(d.hourly.time.map((t,i)=>({time:new Date(t).getHours(),temp:Math.round(d.hourly.temperature_2m[i]),code:d.hourly.weather_code[i]})));setErr(false);}).catch(()=>setErr(true));};
  useEffect(()=>{load();const iv=setInterval(load,CONFIG.refreshInterval);return()=>clearInterval(iv);},[]);
  const wc=data?weatherCodes[data.weather_code]||{icon:"🌍",label:"Unknown"}:null;
  const range=useMemo(()=>{if(!hourly)return{min:0,max:30};const t=hourly.map(h=>h.temp);return{min:Math.min(...t)-2,max:Math.max(...t)+2};},[hourly]);
  return (<Card title={`Weather — ${CONFIG.weatherCity}`} status={data?"LIVE":err?"ERR":"..."} className="span-2">
    {data?(<div><div className="weather-main"><span className="weather-icon">{wc.icon}</span><div><div className="weather-temp">{Math.round(data.temperature_2m)}°C</div><div className="weather-desc">{wc.label} · Feels {Math.round(data.apparent_temperature)}°C</div></div></div>
      <div className="weather-stats"><div><div className="stat-label">Humidity</div><div><span className="stat-value" style={{color:"#38bdf8",fontSize:20}}>{data.relative_humidity_2m}</span><span className="stat-unit">%</span></div></div><div><div className="stat-label">Wind</div><div><span className="stat-value" style={{color:"#f59e42",fontSize:20}}>{data.wind_speed_10m}</span><span className="stat-unit">km/h</span></div></div></div>
      {hourly&&(<div><div className="stat-label" style={{marginBottom:6}}>12h Forecast</div><div className="hourly-chart">{hourly.map((h,i)=>{const r=range.max-range.min;const pct=r>0?((h.temp-range.min)/r)*100:50;const fc=weatherCodes[h.code]||{icon:"🌍"};return(<div className="hourly-bar-wrap" key={i}><div className="hourly-icon">{fc.icon}</div><div className="hourly-temp">{h.temp}°</div><div style={{flex:1,width:'100%',display:'flex',alignItems:'flex-end'}}><div className="hourly-bar" style={{height:`${Math.max(pct,8)}%`,width:'100%'}}/></div><div className="hourly-time">{fmt(h.time)}</div></div>);})}</div></div>)}
    </div>):<div style={{color:"#556",fontSize:13}}>{err?"⚠ Failed to fetch":"Loading..."}</div>}</Card>);
}

function WorldClock() {
  const [now,setNow]=useState(new Date());
  useEffect(()=>{const i=setInterval(()=>setNow(new Date()),1000);return()=>clearInterval(i);},[]);
  return (<Card title="World Clock" status="LIVE"><div className="clocks">{clockZones.map(z=>{const d=new Date(now.toLocaleString("en-US",{timeZone:z.tz}));return(<div key={z.label}><div className="clock-label">{z.label}</div><div className={`clock-time ${z.label==="SOFIA"?"primary":""}`}>{fmt(d.getHours())}:{fmt(d.getMinutes())}:{fmt(d.getSeconds())}</div></div>);})}</div></Card>);
}

function ISSTracker() {
  const [pos,setPos]=useState(null);const [trail,setTrail]=useState([]);const [err,setErr]=useState(false);
  const load=()=>{fetch("https://api.wheretheiss.at/v1/satellites/25544").then(r=>r.json()).then(d=>{const pt={lat:d.latitude,lon:d.longitude};setPos({...pt,alt:d.altitude,vel:d.velocity,vis:d.visibility});setTrail(p=>[...p.slice(-30),pt]);setErr(false);}).catch(()=>setErr(true));};
  useEffect(()=>{load();const iv=setInterval(load,CONFIG.issRefreshInterval);return()=>clearInterval(iv);},[]);
  const toX=lon=>((lon+180)/360)*800,toY=lat=>((90-lat)/180)*400;
  return (<Card title="ISS Live Tracker" status={pos?"LIVE":err?"ERR":"..."} className="span-2">
    {pos?(<div><div style={{borderRadius:4,overflow:'hidden'}}><svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg" style={{background:'#080c12',display:'block'}}>
      {[...Array(7)].map((_,i)=><line key={`h${i}`} x1="0" y1={i*66.6} x2="800" y2={i*66.6} stroke="#111822" strokeWidth="0.5"/>)}
      {[...Array(9)].map((_,i)=><line key={`v${i}`} x1={i*100} y1="0" x2={i*100} y2="400" stroke="#111822" strokeWidth="0.5"/>)}
      <line x1="0" y1="200" x2="800" y2="200" stroke="#1a2332" strokeWidth="1" strokeDasharray="4,4"/>
      <line x1="400" y1="0" x2="400" y2="400" stroke="#1a2332" strokeWidth="1" strokeDasharray="4,4"/>
      <text x="160" y="140" fill="#1a2332" fontSize="10" fontFamily="Share Tech Mono">N.AMERICA</text>
      <text x="360" y="130" fill="#1a2332" fontSize="10" fontFamily="Share Tech Mono">EUROPE</text>
      <text x="360" y="200" fill="#1a2332" fontSize="10" fontFamily="Share Tech Mono">AFRICA</text>
      <text x="550" y="160" fill="#1a2332" fontSize="10" fontFamily="Share Tech Mono">ASIA</text>
      <text x="600" y="280" fill="#1a2332" fontSize="10" fontFamily="Share Tech Mono">OCEANIA</text>
      <text x="240" y="300" fill="#1a2332" fontSize="10" fontFamily="Share Tech Mono">S.AMERICA</text>
      {trail.length>1&&<polyline points={trail.map(p=>`${toX(p.lon)},${toY(p.lat)}`).join(' ')} fill="none" stroke="#ff3c3c" strokeWidth="1.5" opacity="0.4"/>}
      <circle cx={toX(pos.lon)} cy={toY(pos.lat)} r="10" fill="#ff3c3c" opacity="0.15" style={{animation:'pulse 2s infinite'}}/>
      <circle cx={toX(pos.lon)} cy={toY(pos.lat)} r="4" fill="#ff3c3c" style={{animation:'issGlow 2s infinite'}}/>
      <text x={toX(pos.lon)+10} y={toY(pos.lat)-8} fill="#ff6b6b" fontSize="9" fontFamily="Orbitron">ISS</text>
      <circle cx={toX(23.32)} cy={toY(42.70)} r="3" fill="#00ffc8" opacity="0.8"/>
      <text x={toX(23.32)+6} y={toY(42.70)+3} fill="#00ffc855" fontSize="8" fontFamily="Share Tech Mono">SOFIA</text>
    </svg></div>
    <div className="iss-info">
      <div><div className="stat-label">Lat</div><div style={{color:'#ff6b6b',fontSize:14,fontFamily:'Orbitron'}}>{pos.lat.toFixed(4)}°</div></div>
      <div><div className="stat-label">Lon</div><div style={{color:'#ff6b6b',fontSize:14,fontFamily:'Orbitron'}}>{pos.lon.toFixed(4)}°</div></div>
      <div><div className="stat-label">Alt</div><div style={{color:'#8892a4',fontSize:14,fontFamily:'Orbitron'}}>{pos.alt.toFixed(1)} km</div></div>
      <div><div className="stat-label">Speed</div><div style={{color:'#8892a4',fontSize:14,fontFamily:'Orbitron'}}>{pos.vel.toFixed(0)} km/h</div></div>
      <div><div className="stat-label">Vis</div><div style={{color:pos.vis==='daylight'?'#f59e42':'#38bdf8',fontSize:14,fontFamily:'Orbitron'}}>{pos.vis||'N/A'}</div></div>
    </div></div>):<div style={{color:"#556",fontSize:13}}>{err?"⚠ Failed":"Loading..."}</div>}</Card>);
}

function AstronautsCard() {
  const [data,setData]=useState(null);const [err,setErr]=useState(false);
  useEffect(()=>{fetch("http://api.open-notify.org/astros.json").then(r=>r.json()).then(d=>{if(d.people)setData(d);else setErr(true);}).catch(()=>{
    // Fallback if open-notify is down
    setData({number:12,people:[{name:"Loading...",craft:"ISS"}]});
  });},[]);
  return (<Card title="Humans in Space" status={data?"LIVE":err?"ERR":"..."}>
    {data?(<div>
      <div className="astro-count">{data.number}</div>
      <div className="astro-label">ASTRONAUTS IN ORBIT</div>
      <div className="astro-list">{data.people.map((p,i)=>(<div className="astro-row" key={i}><span className="astro-name">👨‍🚀 {p.name}</span><span className="astro-craft">{p.craft}</span></div>))}</div>
    </div>):<div style={{color:"#556",fontSize:13}}>{err?"⚠ Failed":"Loading..."}</div>}</Card>);
}

function SunriseSunsetCard() {
  const [data,setData]=useState(null);const [err,setErr]=useState(false);const [now,setNow]=useState(new Date());
  useEffect(()=>{fetch(`https://api.sunrise-sunset.org/json?lat=${CONFIG.weatherLat}&lng=${CONFIG.weatherLon}&formatted=0`).then(r=>r.json()).then(d=>{if(d.results)setData(d.results);else setErr(true);}).catch(()=>setErr(true));},[]);
  useEffect(()=>{const iv=setInterval(()=>setNow(new Date()),60000);return()=>clearInterval(iv);},[]);
  const fmtTime=iso=>{const d=new Date(iso);return `${fmt(d.getHours())}:${fmt(d.getMinutes())}`;};
  const getDayLength=()=>{if(!data)return'--';const s=parseInt(data.day_length);const h=Math.floor(s/3600);const m=Math.floor((s%3600)/60);return`${h}h ${m}m`;};
  const getSunProgress=()=>{if(!data)return 0;const rise=new Date(data.sunrise).getTime();const set=new Date(data.sunset).getTime();const n=now.getTime();if(n<=rise)return 0;if(n>=set)return 100;return((n-rise)/(set-rise))*100;};
  return (<Card title="Solar Times — Sofia" status={data?"LIVE":err?"ERR":"..."}>
    {data?(<div>
      <div className="sun-times">
        <div className="sun-time"><div className="sun-time-val" style={{color:'#f59e42'}}>🌅 {fmtTime(data.sunrise)}</div><div className="sun-time-label">Sunrise</div></div>
        <div className="sun-time"><div className="sun-time-val" style={{color:'#fbbf24'}}>☀️ {fmtTime(data.solar_noon)}</div><div className="sun-time-label">Solar Noon</div></div>
        <div className="sun-time"><div className="sun-time-val" style={{color:'#ff6b35'}}>🌇 {fmtTime(data.sunset)}</div><div className="sun-time-label">Sunset</div></div>
      </div>
      <div className="sun-bar"><div className="sun-bar-fill" style={{width:'100%'}}/><div className="sun-bar-now" style={{left:`${getSunProgress()}%`}}/></div>
      <div style={{display:'flex',justifyContent:'space-between',fontSize:8,color:'#445',letterSpacing:1}}>
        <span>SUNRISE</span><span>SOLAR NOON</span><span>SUNSET</span>
      </div>
      <div className="sun-info">
        <div className="sun-info-item"><div className="sun-info-val">{getDayLength()}</div><div className="sun-info-label">Day Length</div></div>
        <div className="sun-info-item"><div className="sun-info-val">{fmtTime(data.civil_twilight_begin)}</div><div className="sun-info-label">Dawn</div></div>
        <div className="sun-info-item"><div className="sun-info-val">{fmtTime(data.civil_twilight_end)}</div><div className="sun-info-label">Dusk</div></div>
      </div>
    </div>):<div style={{color:"#556",fontSize:13}}>{err?"⚠ Failed":"Loading..."}</div>}</Card>);
}

function NEOCard() {
  const [neos,setNeos]=useState(null);const [err,setErr]=useState(false);
  useEffect(()=>{
    const today=new Date().toISOString().split('T')[0];
    fetch(`https://api.nasa.gov/neo/rest/v1/feed?start_date=${today}&end_date=${today}&api_key=${CONFIG.nasaKey}`)
      .then(r=>r.json()).then(d=>{
        if(d.near_earth_objects){
          const list=Object.values(d.near_earth_objects).flat().slice(0,6).map(n=>({
            name:n.name.replace(/[()]/g,''),
            diameter:Math.round((n.estimated_diameter.meters.estimated_diameter_min+n.estimated_diameter.meters.estimated_diameter_max)/2),
            distance:parseFloat(n.close_approach_data[0]?.miss_distance?.lunar||0).toFixed(1),
            velocity:Math.round(parseFloat(n.close_approach_data[0]?.relative_velocity?.kilometers_per_hour||0)),
            hazardous:n.is_potentially_hazardous_asteroid,
          }));
          setNeos(list);
        } else setErr(true);
      }).catch(()=>setErr(true));
  },[]);
  return (<Card title="Near-Earth Objects — Today" status={neos?"LIVE":err?"ERR":"..."}>
    {neos?(<div>
      <div style={{fontSize:10,color:'#556',letterSpacing:1,marginBottom:8,textAlign:'center'}}>☄️ {neos.length} ASTEROIDS PASSING NEAR EARTH</div>
      {neos.map((n,i)=>(<div className="neo-row" key={i}>
        <span className="neo-name">🪨 {n.name}</span>
        <span className="neo-size">{n.diameter}m</span>
        <span className="neo-dist">{n.distance} LD</span>
        <span className={`neo-hazard ${n.hazardous?'yes':'no'}`}>{n.hazardous?'HAZARD':'SAFE'}</span>
      </div>))}
    </div>):<div style={{color:"#556",fontSize:13}}>{err?"⚠ NASA rate limited":"Loading..."}</div>}</Card>);
}

function SpaceWeatherCard() {
  const [events,setEvents]=useState(null);const [err,setErr]=useState(false);
  useEffect(()=>{
    const end=new Date().toISOString().split('T')[0];
    const start=new Date(Date.now()-7*86400000).toISOString().split('T')[0];
    Promise.all([
      fetch(`https://api.nasa.gov/DONKI/FLR?startDate=${start}&endDate=${end}&api_key=${CONFIG.nasaKey}`).then(r=>r.json()).catch(()=>[]),
      fetch(`https://api.nasa.gov/DONKI/GST?startDate=${start}&endDate=${end}&api_key=${CONFIG.nasaKey}`).then(r=>r.json()).catch(()=>[]),
      fetch(`https://api.nasa.gov/DONKI/CME?startDate=${start}&endDate=${end}&api_key=${CONFIG.nasaKey}`).then(r=>r.json()).catch(()=>[]),
    ]).then(([flares,storms,cmes])=>{
      const all=[];
      if(Array.isArray(flares))flares.slice(-3).forEach(f=>all.push({type:'SOLAR FLARE',time:f.beginTime,detail:`Class ${f.classType||'N/A'}`,icon:'☀️'}));
      if(Array.isArray(storms))storms.slice(-2).forEach(s=>all.push({type:'GEOMAGNETIC STORM',time:s.startTime,detail:`Kp Index: ${s.allKpIndex?.[0]?.kpIndex||'N/A'}`,icon:'🌊'}));
      if(Array.isArray(cmes))cmes.slice(-2).forEach(c=>all.push({type:'CORONAL MASS EJECTION',time:c.startTime,detail:c.note?.slice(0,80)||'Detected',icon:'💫'}));
      all.sort((a,b)=>new Date(b.time)-new Date(a.time));
      setEvents(all.slice(0,5));setErr(false);
    }).catch(()=>setErr(true));
  },[]);
  const ago=t=>{const h=Math.round((Date.now()-new Date(t).getTime())/3600000);return h<24?`${h}h ago`:`${Math.round(h/24)}d ago`;};
  return (<Card title="Space Weather — 7 Days" status={events?"LIVE":err?"ERR":"..."}>
    {events?(events.length>0?events.map((e,i)=>(<div className="sw-event" key={i}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <span className="sw-type">{e.icon} {e.type}</span><span className="sw-time">{ago(e.time)}</span>
      </div><div className="sw-detail">{e.detail}</div>
    </div>)):<div className="sw-quiet">🛡️ ALL QUIET — No significant space weather events</div>
    ):<div style={{color:"#556",fontSize:13}}>{err?"⚠ NASA rate limited":"Loading..."}</div>}</Card>);
}

function EarthquakeCard() {
  const [quakes,setQuakes]=useState(null);const [err,setErr]=useState(false);
  const load=()=>{fetch("https://earthquake.usgs.gov/earthquakes/feed/v1.0/summary/2.5_day.geojson").then(r=>r.json()).then(d=>{setQuakes(d.features.slice(0,8).map(f=>({mag:f.properties.mag,place:f.properties.place,time:f.properties.time,lon:f.geometry.coordinates[0],lat:f.geometry.coordinates[1]})));setErr(false);}).catch(()=>setErr(true));};
  useEffect(()=>{load();const iv=setInterval(load,CONFIG.refreshInterval);return()=>clearInterval(iv);},[]);
  const toX=lon=>((lon+180)/360)*800,toY=lat=>((90-lat)/180)*400;
  const magColor=m=>m>=6?'#ef4444':m>=4.5?'#f59e42':m>=3?'#eab308':'#22c55e';
  const ago=t=>{const m=Math.round((Date.now()-t)/60000);return m<60?`${m}m ago`:`${Math.round(m/60)}h ago`;};
  return (<Card title="Seismic Activity — 24h (M2.5+)" status={quakes?"LIVE":err?"ERR":"..."} className="span-2">
    {quakes?(<div><div style={{borderRadius:4,overflow:'hidden',marginBottom:10}}><svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg" style={{background:'#080c12',display:'block'}}>
      {[...Array(7)].map((_,i)=><line key={`h${i}`} x1="0" y1={i*66.6} x2="800" y2={i*66.6} stroke="#111822" strokeWidth="0.5"/>)}
      {[...Array(9)].map((_,i)=><line key={`v${i}`} x1={i*100} y1="0" x2={i*100} y2="400" stroke="#111822" strokeWidth="0.5"/>)}
      <line x1="0" y1="200" x2="800" y2="200" stroke="#1a2332" strokeWidth="1" strokeDasharray="4,4"/>
      {quakes.map((q,i)=>(<g key={i}><circle cx={toX(q.lon)} cy={toY(q.lat)} r={Math.max(q.mag*3,4)} fill={magColor(q.mag)} opacity="0.2" style={{animation:'pulse 2s infinite'}}/><circle cx={toX(q.lon)} cy={toY(q.lat)} r={Math.max(q.mag*1.2,2)} fill={magColor(q.mag)} opacity="0.8"/></g>))}
    </svg></div>
    {quakes.slice(0,5).map((q,i)=>(<div className="quake-row" key={i}><div className="quake-mag" style={{color:magColor(q.mag)}}>{q.mag.toFixed(1)}</div><div className="quake-place">{q.place}</div><div className="quake-time">{ago(q.time)}</div></div>))}
    </div>):<div style={{color:"#556",fontSize:13}}>{err?"⚠ Failed":"Loading..."}</div>}</Card>);
}

function SpaceXCard() {
  const [launch,setLaunch]=useState(null);const [countdown,setCountdown]=useState(null);const [err,setErr]=useState(false);
  useEffect(()=>{fetch("https://ll.thespacedevs.com/2.3.0/launches/upcoming/?limit=1&agencies__name=SpaceX").then(r=>r.json()).then(d=>{if(d.results?.length>0){const l=d.results[0];setLaunch({name:l.name,net:l.net,pad:l.pad?.name||'TBD',rocket:l.rocket?.configuration?.name||'Falcon 9'});}else setErr(true);}).catch(()=>{
    fetch("https://lldev.thespacedevs.com/2.3.0/launches/upcoming/?limit=1&search=SpaceX").then(r=>r.json()).then(d=>{if(d.results?.length>0){const l=d.results[0];setLaunch({name:l.name,net:l.net,pad:l.pad?.name||'TBD',rocket:l.rocket?.configuration?.name||'Falcon 9'});}else setErr(true);}).catch(()=>setErr(true));});},[]);
  useEffect(()=>{if(!launch)return;const tick=()=>{const diff=new Date(launch.net)-Date.now();if(diff<=0){setCountdown({d:0,h:0,m:0,s:0,past:true});return;}setCountdown({d:Math.floor(diff/86400000),h:Math.floor((diff%86400000)/3600000),m:Math.floor((diff%3600000)/60000),s:Math.floor((diff%60000)/1000),past:false});};tick();const iv=setInterval(tick,1000);return()=>clearInterval(iv);},[launch]);
  return (<Card title="Next SpaceX Launch" status={launch?"LIVE":err?"ERR":"..."}>
    {launch&&countdown?(<div><div className="launch-rocket">🚀</div><div className="launch-name">{launch.name}</div><div className="launch-detail">{launch.rocket} · {launch.pad}</div>
    {countdown.past?(<div style={{textAlign:'center',color:'#22c55e',fontFamily:'Orbitron',fontSize:14,marginTop:12}}>LAUNCHED!</div>):
    (<div className="launch-countdown"><div className="launch-unit"><div className="launch-num">{fmt(countdown.d)}</div><div className="launch-label">Days</div></div><div className="launch-unit"><div className="launch-num">{fmt(countdown.h)}</div><div className="launch-label">Hours</div></div><div className="launch-unit"><div className="launch-num">{fmt(countdown.m)}</div><div className="launch-label">Min</div></div><div className="launch-unit"><div className="launch-num">{fmt(countdown.s)}</div><div className="launch-label">Sec</div></div></div>)}
    </div>):<div style={{color:"#556",fontSize:13}}>{err?"⚠ Failed":"Loading..."}</div>}</Card>);
}

function ServiceHealth() {
  const [services,setServices]=useState(CONFIG.services.map(s=>({...s,status:"checking",latency:null})));
  const check=()=>{CONFIG.services.forEach((svc,idx)=>{const start=performance.now();const ctrl=new AbortController();const to=setTimeout(()=>ctrl.abort(),8000);
    fetch(svc.url,{mode:'no-cors',signal:ctrl.signal,cache:'no-store'}).then(()=>{clearTimeout(to);const ms=Math.round(performance.now()-start);setServices(p=>{const n=[...p];n[idx]={...svc,status:"up",latency:ms};return n;});}).catch(()=>{clearTimeout(to);setServices(p=>{const n=[...p];n[idx]={...svc,status:"down",latency:null};return n;});});});};
  useEffect(()=>{check();const iv=setInterval(check,60000);return()=>clearInterval(iv);},[]);
  const allUp=services.every(s=>s.status==="up"),anyCheck=services.some(s=>s.status==="checking");
  return (<Card title="Service Health" status={anyCheck?"...":allUp?"LIVE":"ERR"}>
    {services.map((svc,i)=>(<div className="service-row" key={i}><div className="service-name"><span className={`service-dot ${svc.status}`}/>{svc.name}</div>
      <div style={{display:'flex',alignItems:'center',gap:10}}>{svc.latency!==null&&<span className="service-latency">{svc.latency}ms</span>}<span className={`service-badge ${svc.status}`}>{svc.status==="up"?"ONLINE":svc.status==="down"?"DOWN":"CHECK"}</span></div></div>))}
  </Card>);
}

function PopulationCard() {
  const [pop,setPop]=useState(CONFIG.populationBase);const startRef=useRef(Date.now());
  useEffect(()=>{const iv=setInterval(()=>{setPop(Math.floor(CONFIG.populationBase+((Date.now()-startRef.current)/1000)*CONFIG.populationRate));},500);return()=>clearInterval(iv);},[]);
  return (<Card title="World Population" status="LIVE">
    <div className="pop-number">{pop.toLocaleString('en-US')}</div>
    <div className="pop-rate"><div className="pop-stat"><div className="pop-stat-val" style={{color:'#22c55e'}}>+{CONFIG.populationRate}/s</div><div className="pop-stat-label">Net Growth</div></div><div className="pop-stat"><div className="pop-stat-val" style={{color:'#38bdf8'}}>~385k</div><div className="pop-stat-label">Born Today</div></div><div className="pop-stat"><div className="pop-stat-val" style={{color:'#f59e42'}}>~165k</div><div className="pop-stat-label">Deaths Today</div></div></div>
  </Card>);
}

function SpaceFactCard() {
  const [idx,setIdx]=useState(Math.floor(Math.random()*SPACE_FACTS.length));
  useEffect(()=>{const iv=setInterval(()=>setIdx(Math.floor(Math.random()*SPACE_FACTS.length)),15000);return()=>clearInterval(iv);},[]);
  return (<Card title="Space Fact"><div className="space-fact">"{SPACE_FACTS[idx]}"</div><div className="space-fact-src">ROTATES EVERY 15 SECONDS</div></Card>);
}

function VisitorCard() {
  const [count,setCount]=useState(null);
  useEffect(()=>{let vid=localStorage.getItem('mc_vid');if(!vid){vid=Math.random().toString(36).slice(2);localStorage.setItem('mc_vid',vid);}
    const stored=parseInt(localStorage.getItem('mc_vc')||'0');const last=localStorage.getItem('mc_lv');const today=new Date().toDateString();
    if(last!==today){const nc=stored+1;localStorage.setItem('mc_vc',nc);localStorage.setItem('mc_lv',today);setCount(nc);}else{setCount(stored);}
  },[]);
  return (<Card title="Visitor Log"><div className="visitor-count">{count!==null?count.toLocaleString():'--'}</div><div className="visitor-sub">UNIQUE SESSIONS (THIS BROWSER)</div></Card>);
}

function APODCard() {
  const [apod,setApod]=useState(null);const [err,setErr]=useState(false);
  useEffect(()=>{fetch(`https://api.nasa.gov/planetary/apod?api_key=${CONFIG.nasaKey}`).then(r=>r.json()).then(d=>{if(d.url)setApod(d);else setErr(true);}).catch(()=>setErr(true));},[]);
  return (<Card title="NASA — Astronomy Picture of the Day" status={apod?"LIVE":err?"ERR":"..."} className="span-3">
    {apod?(<div className="apod-content">{apod.media_type==="video"?<iframe src={apod.url} style={{width:200,height:140,border:"1px solid #1a2332",borderRadius:4,flexShrink:0}} allowFullScreen/>:<img src={apod.url} alt={apod.title} className="apod-img"/>}
      <div style={{minWidth:0}}><div className="apod-title">{apod.title}</div><div className="apod-date">{apod.date}</div><div className="apod-desc">{apod.explanation?.slice(0,350)}…</div></div>
    </div>):<div style={{color:"#556",fontSize:13}}>{err?"⚠ Rate limited — get free key at api.nasa.gov":"Loading..."}</div>}</Card>);
}

  {text:"[SAT] ISS Orbital Tracking .................. OK",type:"ok"},
  {text:"[SAT] Crew Manifest ......................... OK",type:"ok"},
  {text:"[SOL] Solar Position Calculator .............. OK",type:"ok"},
  {text:"[GEO] USGS Seismic Feed ..................... OK",type:"ok"},
  {text:"[SPC] SpaceX Launch Schedule ................. OK",type:"ok"},
  {text:"[NEO] Near-Earth Object Watch ................ OK",type:"ok"},
  {text:"[SOL] NASA DONKI Space Weather ............... OK",type:"ok"},
  {text:"[IMG] NASA APOD ............................. OK",type:"ok"},
  {text:"[MON] Service Health Check ................... OK",type:"ok"},
  {text:"[CLK] World Clock Sync ...................... OK",type:"ok"},
  {text:"[SYS] All systems nominal. Welcome, operator.",type:"welcome"},
];

function App() {
  const [bootDone,setBoot]=useState(false);const [bootLines,setBootLines]=useState([]);const idxRef=useRef(0);
  useEffect(()=>{idxRef.current=0;setBootLines([]);const iv=setInterval(()=>{if(idxRef.current<BOOT_LINES.length){const l=BOOT_LINES[idxRef.current];idxRef.current++;setBootLines(p=>[...p,l]);}else{clearInterval(iv);setTimeout(()=>setBoot(true),400);}},110);return()=>clearInterval(iv);},[]);

  if(!bootDone)return(<div className="boot-screen"><div style={{maxWidth:540}}>{bootLines.map((l,i)=><div key={i} className={`boot-line ${l.type}`}>{l.text}</div>)}</div></div>);

  return (<div className="dashboard">
    <div className="header"><div><div className="header-title">MISSION CONTROL</div><div className="header-sub">SPACE OPS DASHBOARD · v3.0.0</div></div>
      <div className="header-status"><span className="blink-dot blink-green"/>ALL SYSTEMS NOMINAL</div></div>
    <div className="grid">
      <WeatherCard />
      <WorldClock />
      <ISSTracker />
      <AstronautsCard />
      <SpaceXCard />
      <SunriseSunsetCard />
      <EarthquakeCard />
      <SpaceWeatherCard />
      <NEOCard />
      <ServiceHealth />
      <PopulationCard />
      <SpaceFactCard />
      <VisitorCard />
      <APODCard />
    </div>
    <div className="footer">OPEN-METEO · NASA · USGS · WHERETHEISS · SPACEDEVS · OPEN-NOTIFY · SUNRISE-SUNSET · ALL FREE APIs</div>
  </div>);
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
