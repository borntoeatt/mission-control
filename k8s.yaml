apiVersion: v1
kind: Namespace
metadata:
  name: mission-control
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mission-control
  namespace: mission-control
  labels:
    app: mission-control
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mission-control
  template:
    metadata:
      labels:
        app: mission-control
    spec:
      containers:
        - name: mission-control
          image: dimitar6768/mission-control:latest
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 50m
              memory: 32Mi
---
apiVersion: v1
kind: Service
metadata:
  name: mission-control
  namespace: mission-control
spec:
  selector:
    app: mission-control
  ports:
    - port: 80
      targetPort: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: mission-control
  namespace: mission-control
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  rules:
    - host: mission-control.local   # change to your domain or use nip.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: mission-control
                port:
                  number: 80
